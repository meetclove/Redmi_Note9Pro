name: Build Xiaomi Kernel (gauguin)

on:
  workflow_dispatch:

env:
  KERNEL_SOURCE: https://github.com/MiCode/Xiaomi_Kernel_OpenSource
  KERNEL_BRANCH: pipa-t-oss
  DEFCONFIG: vendor/pipa_user_defconfig
  ANYKERNEL3_URL: https://github.com/osm0sis/AnyKernel3
  ANYKERNEL3_BRANCH: master

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Build Environment
      run: |
        echo "安装编译环境依赖..."
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python2 python3

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-kernel-gauguin-${{ env.KERNEL_BRANCH }}
        max-size: 10G

    - name: Download Clang & AOSP GCC Toolchains
      run: |
        echo "1. 拉取 Azure Clang (替代老旧的 Proton Clang，支持新版内核警告参数)..."
        # 使用 Azure Clang，它包含了较新的 LLVM/Clang 版本
        git clone --depth=1 https://gitlab.com/Panchajanya1999/azure-clang.git clang

        echo "2. 拉取 LineageOS 官方 AOSP GCC 64-bit..."
        git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git gcc-64

        echo "3. 拉取 LineageOS 官方 AOSP GCC 32-bit..."
        git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git gcc-32

    - name: Clone Kernel Source
      run: |
        echo "拉取内核源码..."
        git clone --depth=1 --branch ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_SOURCE }} kernel-source

    - name: Build Kernel (Clang + GCC)
      run: |
        # 环境变量路径保持不变
        export PATH="$GITHUB_WORKSPACE/clang/bin:$GITHUB_WORKSPACE/gcc-64/bin:$GITHUB_WORKSPACE/gcc-32/bin:$PATH"
        cd kernel-source
        
        # ============================================================
        # 终极修复：全局搜索并删除 AOSP 魔改的未识别警告参数
        # ============================================================
        echo "正在清理不支持的 Clang 警告参数..."
        grep -rl -- "-Wno-default-const-init-var-unsafe" . | xargs sed -i 's/-Wno-default-const-init-var-unsafe//g' || true
        grep -rl -- "-Wno-default-const-init-field-unsafe" . | xargs sed -i 's/-Wno-default-const-init-field-unsafe//g' || true

        # ============================================================
        # 保留 stpcpy 修复补丁
        # ============================================================
        echo "正在应用 stpcpy 修复补丁..."
        TARGET_FILE="drivers/tty/tty_io.c"
        if [ -f "$TARGET_FILE" ]; then
            sed -i '1i char *stpcpy(char *dest, const char *src); char *stpcpy(char *dest, const char *src) { while ((*dest = *src)) { dest++; src++; } return dest; }' "$TARGET_FILE"
        fi

        export HOSTCFLAGS="-fcommon"
        export HOSTLDFLAGS="-fcommon"
        export KBUILD_BUILD_USER="builder"
        export KBUILD_BUILD_HOST="github-actions"

        # 恢复正常的参数，不再需要强行注入
        MAKE_ARGS=(
          ARCH=arm64
          O=out
          CC="ccache clang"
          CLANG_TRIPLE=aarch64-linux-gnu-
          CROSS_COMPILE=aarch64-linux-android-
          CROSS_COMPILE_ARM32=arm-linux-androideabi-
        )

        echo "生成 defconfig..."
        make -j$(nproc --all) "${MAKE_ARGS[@]}" ${{ env.DEFCONFIG }}

        echo "开始正式混合编译内核..."
        make -j$(nproc --all) "${MAKE_ARGS[@]}"

    - name: Package with AnyKernel3
      run: |
        echo "开始打包 AnyKernel3..."
        git clone --depth=1 --branch ${{ env.ANYKERNEL3_BRANCH }} ${{ env.ANYKERNEL3_URL }} AnyKernel3
        
        # 寻找内核产物
        find kernel-source/out/arch/arm64/boot -name "Image*" -exec cp {} AnyKernel3/ \;
        find kernel-source/out/arch/arm64/boot -name "dtb" -exec cp {} AnyKernel3/ \;
        find kernel-source/out/arch/arm64/boot -name "dtbo.img" -exec cp {} AnyKernel3/ \; || true

        cd AnyKernel3
        zip -r9 ../AnyKernel3-gauguin-${{ env.KERNEL_BRANCH }}.zip * -x .git README.md *placeholder

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-gauguin-kernel
        path: AnyKernel3-gauguin-${{ env.KERNEL_BRANCH }}.zip
