name: Build Gauguin 4.19 SukiSU-Ultra

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout local repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set swap to 10G
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: gauguin-4.19-sukisu-ultra
          max-size: 2G

      - name: Setup environment variables
        run: |
          echo "KERNEL_DEFCONFIG=vendor/gauguin_user_defconfig" >> $GITHUB_ENV
          echo "BUILD_TIME=$(TZ=Asia/Shanghai date '+%Y%m%d%H%M')" >> $GITHUB_ENV

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget flex bison lzop \
            make bc cpio kmod xz-utils \
            libssl-dev libelf-dev \
            python3 python-is-python3 \
            libncurses-dev rsync unzip ca-certificates

      - name: Download toolchains
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc64
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 gcc32

          wget -O clang.tar.gz https://github.com/ZyCromerZ/Clang/releases/download/16.0.6-20250721-release/Clang-16.0.6-20250721.tar.gz
          mkdir -p clang
          tar -xf clang.tar.gz -C clang --strip-components=1

          echo "Toolchain layout:"
          ls -lah gcc64/bin | head
          ls -lah gcc32/bin | head
          ls -lah clang/bin | head

      - name: Show toolchain versions
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$GITHUB_WORKSPACE/gcc64/bin:$GITHUB_WORKSPACE/gcc32/bin:$PATH
          which clang || true
          which aarch64-linux-android-gcc || true
          which arm-linux-androideabi-gcc || true
          clang --version || true
          aarch64-linux-android-gcc --version || true
          arm-linux-androideabi-gcc --version || true

      - name: Checkout kernel source
        run: |
          git clone --depth=1 --branch gauguin-r-oss https://github.com/MiCode/Xiaomi_Kernel_OpenSource project

      - name: Apply local patch
        run: |
          cd project
          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_MANUAL_HOOK=y"
            echo "CONFIG_KSU_SUSFS=n"
          } >> arch/arm64/configs/${{ env.KERNEL_DEFCONFIG }}

          git apply ../ksu_hooks_sukisu_4.19.patch

      - name: Setup SukiSU-Ultra
        run: |
          cd project
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin
          git config --global user.email "bot@example.com"
          git config --global user.name "bot"
          git add .
          git commit -m "Integrate SukiSU-Ultra" || true

      - name: Prepare out dir
        run: |
          mkdir -p project/out

      - name: Build defconfig
        run: |
          cd project
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER=github
          export KBUILD_BUILD_HOST=actions
          export PATH=$GITHUB_WORKSPACE/clang/bin:$GITHUB_WORKSPACE/gcc64/bin:$GITHUB_WORKSPACE/gcc32/bin:$PATH

          make O=out \
            ARCH=arm64 \
            SUBARCH=arm64 \
            CC=clang \
            HOSTCC=clang \
            CLANG_TRIPLE=aarch64-linux-android- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            ${{ env.KERNEL_DEFCONFIG }}

      - name: Build kernel
        run: |
          cd project
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER=github
          export KBUILD_BUILD_HOST=actions
          export PATH=$GITHUB_WORKSPACE/clang/bin:$GITHUB_WORKSPACE/gcc64/bin:$GITHUB_WORKSPACE/gcc32/bin:$PATH

          make -j"$(nproc)" O=out \
            ARCH=arm64 \
            SUBARCH=arm64 \
            CC=clang \
            HOSTCC=clang \
            CLANG_TRIPLE=aarch64-linux-android- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            V=1

      - name: Show output files
        if: always()
        run: |
          echo "Boot artifacts:"
          find project/out/arch/arm64/boot -maxdepth 3 -type f | sort || true

      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Gauguin_4.19_${{ env.BUILD_TIME }}
          path: |
            project/out/arch/arm64/boot/Image*
            project/out/arch/arm64/boot/dtbo.img
            project/out/arch/arm64/boot/dts/**/*.dtb
          if-no-files-found: warn
