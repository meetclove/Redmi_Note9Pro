name: Build Xiaomi Kernel (gauguin)

on:
  workflow_dispatch:

env:
  KERNEL_SOURCE: https://github.com/MiCode/Xiaomi_Kernel_OpenSource
  KERNEL_BRANCH: gauguin-r-oss
  DEFCONFIG: vendor/gauguin_user_defconfig
  ARCH: arm64
  ANYKERNEL3_URL: https://github.com/osm0sis/AnyKernel3
  ANYKERNEL3_BRANCH: master

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python2 python3

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-kernel-gauguin-${{ env.KERNEL_BRANCH }}
        max-size: 5G

    - name: Download Clang & GCC Toolchains
      run: |
        # 使用 Proton Clang，它对 4.19 内核支持非常好
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang

    - name: Clone Kernel Source
      run: |
        git clone --depth=1 --branch ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_SOURCE }} kernel-source

    - name: Build Kernel
      run: |
        export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
        cd kernel-source
        
        # 【关键修复 1】强制删除工具链中那个不兼容的 'as'
        # 这样执行 CC 时，Clang 找不到外部 as 就会老老实实用自己的 Integrated Assembler
        rm -f $GITHUB_WORKSPACE/clang/bin/aarch64-linux-gnu-as
        rm -f $GITHUB_WORKSPACE/clang/bin/arm-linux-gnueabi-as
        rm -f $GITHUB_WORKSPACE/clang/bin/as

        # 【关键修复 2】设置 Host 端的 CFLAGS 解决 yylloc 重复定义
        export HOSTCFLAGS="-fcommon"
        export HOSTLDFLAGS="-fcommon"

        export KBUILD_BUILD_USER="builder"
        export KBUILD_BUILD_HOST="github-actions"

        # 定义全套 LLVM 工具链参数
        # 这里的关键是把 AS 设置为 clang，并传入 --target
        MAKE_ARGS=(
          ARCH=arm64
          O=out
          CC="ccache clang"
          AS=clang
          LD=ld.lld
          AR=llvm-ar
          NM=llvm-nm
          OBJCOPY=llvm-objcopy
          OBJDUMP=llvm-objdump
          STRIP=llvm-strip
          READELF=llvm-readelf
          OBJSIZE=llvm-size
          HOSTCC=gcc
          HOSTCXX=g++
          CROSS_COMPILE=aarch64-linux-gnu-
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          CLANG_TRIPLE=aarch64-linux-gnu-
          LLVM=1
          LLVM_IAS=1
        )

        echo "生成 defconfig..."
        make -j$(nproc --all) "${MAKE_ARGS[@]}" ${{ env.DEFCONFIG }}

        echo "开始正式编译..."
        # 如果依然在 scripts/mod 报错，尝试在这里加上 V=1 看看详细命令
        make -j$(nproc --all) "${MAKE_ARGS[@]}"
        

    - name: Package with AnyKernel3
      run: |
        git clone --depth=1 --branch ${{ env.ANYKERNEL3_BRANCH }} ${{ env.ANYKERNEL3_URL }} AnyKernel3
        # 针对 4.19 内核，主要的产物通常是 Image.gz 和 dtb
        find kernel-source/out/arch/arm64/boot -name "Image.gz" -exec cp {} AnyKernel3/ \;
        find kernel-source/out/arch/arm64/boot -name "dtb" -exec cp {} AnyKernel3/ \;
        find kernel-source/out/arch/arm64/boot -name "dtbo.img" -exec cp {} AnyKernel3/ \; || true

        cd AnyKernel3
        zip -r9 ../AnyKernel3-gauguin.zip *

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-RedmiNote9Pro-5G
        path: AnyKernel3-gauguin.zip
